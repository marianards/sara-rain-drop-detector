name: Deploy to Development

# Only one workflow in a concurrency group may run at a time
concurrency:
  group: development-concurrency
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "main"

jobs:
  trigger-github-deployment:
    name: Trigger GitHub Deployment
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - name: Empty Step
        run: echo "Hello World"

  get-short-sha:
    needs: trigger-github-deployment
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - id: get-tag
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tag=$SHA_SHORT" >> "$GITHUB_OUTPUT"

  build-and-push-components:
    name: Build and push containers to acr for Development
    needs: [trigger-github-deployment, get-short-sha]
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    with:
      registry: auroradevacr.azurecr.io
      image_name: robotics/sara-rain-drop-detector
      tag: "dev.${{ needs.get-short-sha.outputs.tag }}"
      secondary_tag: latest
    secrets:
      registry_username: ${{ secrets.ROBOTICS_AURORADEVACR_USERNAME }}
      registry_password: ${{ secrets.ROBOTICS_AURORADEVACR_PASSWORD }}

  deploy:
    name: Update deployment in Development
    needs: [build-and-push-components, get-short-sha, trigger-github-deployment]
    uses: equinor/armada/.github/workflows/update_kubernetes_deployment.yml@main
    with:
      environment: development
      registry: auroradevacr.azurecr.io
      image_name: robotics/sara-rain-drop-detector
      tag: "dev.${{ needs.get-short-sha.outputs.tag }}"
      author_email: ${{ github.event.head_commit.author.email }}
      author_name: ${{ github.event.head_commit.author.name }}
      infrastructure_repository: equinor/analytics-infrastructure
    secrets:
      deploy_key: ${{ secrets.ANALYTICS_INFRASTRUCTURE_DEPLOY_KEY }}
